services:
  backend:
    build: ./backend
    container_name: tsp-art-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: tsp-art-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
